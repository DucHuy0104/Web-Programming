<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      height: 100vh;
      background-color: #2b2b2b;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .register-container {
      background-color: #555;
      padding: 30px 20px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
      color: white;
    }
    .register-container img {
      width: 60px;
      margin-bottom: 20px;
    }
    .input-box {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }
    .register-btn {
      width: 100%;
      padding: 12px;
      background-color: #91b8cd;
      border: none;
      border-radius: 5px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .register-btn:hover {
      background-color: #7ca7bd;
    }
    .error {
      color: #ffb3b3;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Adidas_Logo.svg" alt="Logo" />
    
    <div id="errorMsg" class="error"></div>
    
    <input type="text" id="user" class="input-box" placeholder="USER" />
    <input type="text" id="email" class="input-box" placeholder="EMAIL ADDRESS" />
    <input type="password" id="password" class="input-box" placeholder="PASSWORD" />
    <input type="text" id="address" class="input-box" placeholder="ADDRESS" />

    <button class="register-btn" onclick="register()">REGISTER</button>
  </div>

  <script>
  function register() {
  const user = document.getElementById("user").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const address = document.getElementById("address").value.trim();
  const errorDiv = document.getElementById("errorMsg");

  const formData = new FormData();
  formData.append("user", user);
  formData.append("email", email);
  formData.append("password", password);
  formData.append("address", address);

  fetch("register.php", {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
    if (data === "success") {
      errorDiv.style.color = "lightgreen";
      errorDiv.textContent = "Đăng ký thành công! Đang chuyển hướng...";
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    } else {
      errorDiv.style.color = "#ffb3b3";
      errorDiv.textContent = data;
    }
  });
}

</script>

</body>
</html>
